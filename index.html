<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז משחקי עץ - Multiplayer Online</title>
    
    <!-- ספריות חיצוניות -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <!-- חיבור לעיצוב המקומי -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- מודל בחירת מצב משחק -->
    <div id="mode-modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3 id="mode-modal-title">בחר משחק</h3>
            <p>איך תרצה לשחק?</p>
            <button class="mode-btn ai" onclick="window.launchGame('ai')">🤖 נגד המחשב</button>
            <button class="mode-btn pvp" onclick="window.launchGame('pvp')">🧑‍🤝‍🧑 נגד חבר (מקומי)</button>
            <button class="mode-btn online-mode" onclick="window.showOnlineLobby()">🌐 נגד חבר מרחוק (Online)</button>
            <button class="mode-btn cancel" onclick="window.closeModeModal()">ביטול</button>
        </div>
    </div>

    <!-- מסך לובי אונליין -->
    <div id="online-lobby-screen" class="game-screen" style="display:none;">
        <h2 id="lobby-game-name">הגדרת משחק רשת</h2>
        
        <div class="lobby-card">
            <div class="lobby-section">
                <h3>אפשרות 1: יצירת חדר</h3>
                <p class="instruction">צור קוד חדר ושלח אותו לחבר שלך.</p>
                <button id="create-room-btn" class="action-btn create-btn" onclick="window.createOnlineRoom()">➕ צור חדר וקבל קוד</button>
                
                <div id="active-room-info" style="display: none; margin-top: 15px;">
                    <p>הקוד שלך: <strong id="display-room-id" class="room-code-tag"></strong></p>
                    <p class="waiting-msg pulse">⏳ ממתין שהחבר יתחבר... המשחק יתחיל מיד.</p>
                </div>
            </div>

            <div class="separator">או</div>

            <div class="lobby-section">
                <h3>אפשרות 2: הצטרפות לחדר</h3>
                <p class="instruction">הכנס את הקוד שקיבלת מהחבר:</p>
                <div class="join-input-group">
                    <input type="text" id="room-input" placeholder="קוד חדר" maxlength="6">
                    <button class="action-btn join-btn" onclick="window.joinOnlineRoom()">🔗 הצטרף</button>
                </div>
            </div>
        </div>

        <button class="action-btn back-btn" onclick="window.showScreen('menu-screen')">חזור לתפריט</button>
    </div>

    <!-- מסך סיום משחק -->
    <div id="endgame-overlay" style="display:none;">
        <div class="modal-box endgame-box" id="endgame-box">
            <h2 id="endgame-title">סיום משחק</h2>
            <div id="endgame-icon">🏆</div>
            <button class="mode-btn pvp" onclick="window.closeEndgameOverlay()">סגור</button>
        </div>
    </div>

    <div class="container">
        <!-- תפריט ראשי -->
        <div id="menu-screen">
            <h1>מרכז משחקי עץ</h1>
            <div id="connection-status" class="status-bar">מתחבר לענן... ⏳</div>
            
            <div class="menu-grid">
                <button class="menu-btn" onclick="window.openModeModal('chess', '♟️ שחמט')">♟️ שחמט</button>
                <button class="menu-btn" onclick="window.openModeModal('checkers', '🔴 דמקה')">🔴 דמקה</button>
                <button class="menu-btn" onclick="window.openModeModal('tictactoe', '❌ איקס עיגול')">❌ איקס עיגול</button>
                <button class="menu-btn" onclick="window.openModeModal('snakes', '🐍 סולמות ונחשים')">🐍 סולמות ונחשים</button>
            </div>
        </div>

        <!-- מסכי משחק -->
        <div id="chess-screen" class="game-screen" style="display:none;">
            <h2>שחמט</h2>
            <div id="chessBoard" style="width: 400px; margin: 0 auto;"></div>
            <div class="info-panel">
                <p id="chess-status" class="status-text"></p>
                <button class="action-btn back-btn" onclick="location.reload()">חזור לתפריט</button>
            </div>
        </div>
    </div>

    <!-- טעינת סקריפטים מתיקיית js -->
    <script type="module" src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chess.js"></script>
</body>
</html>
