<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז משחקי עץ - Multiplayer Online</title>
    
    <!-- ספריות חיצוניות -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- מודל בחירת מצב משחק -->
    <div id="mode-modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3 id="mode-modal-title">בחר משחק</h3>
            <p>איך תרצה לשחק?</p>
            <button class="mode-btn ai" onclick="window.launchGame('ai')">🤖 נגד המחשב</button>
            <button class="mode-btn pvp" onclick="window.launchGame('pvp')">🧑‍🤝‍🧑 נגד חבר (מקומי)</button>
            <button id="online-mode-btn" class="mode-btn online-mode" onclick="window.showOnlineLobby()">🌐 נגד חבר מרחוק (Online)</button>
            <button class="mode-btn cancel" onclick="window.closeModeModal()">ביטול</button>
        </div>
    </div>

    <!-- לובי אונליין -->
    <div id="online-lobby-screen" class="game-screen" style="display:none;">
        <h2 id="lobby-game-name">הגדרת משחק רשת</h2>
        <div class="lobby-card">
            <div class="lobby-section">
                <h3>אפשרות 1: יצירת חדר</h3>
                <button id="create-room-btn" class="action-btn create-btn" onclick="window.createOnlineRoom()">➕ צור חדר וקבל קוד</button>
                <div id="active-room-info" style="display: none; margin-top: 15px;">
                    <p>הקוד שלך: <strong id="display-room-id" class="room-code-tag"></strong></p>
                    <p class="waiting-msg pulse">⏳ ממתין שהחבר יתחבר...</p>
                </div>
            </div>
            <div class="separator">או</div>
            <div class="lobby-section">
                <h3>אפשרות 2: הצטרפות לחדר</h3>
                <div class="join-input-group">
                    <input type="text" id="room-input" placeholder="קוד חדר" maxlength="6">
                    <button class="action-btn join-btn" onclick="window.joinOnlineRoom()">🔗 הצטרף</button>
                </div>
            </div>
        </div>
        <button class="action-btn back-btn" onclick="window.showScreen('menu-screen')">חזור לתפריט</button>
    </div>

    <!-- הודעת סיום -->
    <div id="endgame-overlay" style="display:none;">
        <div class="modal-box endgame-box">
            <h2 id="endgame-title">סיום!</h2>
            <div id="endgame-icon" style="font-size: 3rem; margin: 15px 0;">🏆</div>
            <button class="mode-btn pvp" onclick="window.closeEndgameOverlay()">סגור</button>
        </div>
    </div>

    <div class="container">
        <!-- תפריט ראשי -->
        <div id="menu-screen">
            <h1>מרכז משחקי עץ</h1>
            <div id="connection-status" class="status-bar">מתחבר לענן...</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="window.openModeModal('chess', '♟️ שחמט')">♟️ שחמט</button>
                <button class="menu-btn" onclick="window.openModeModal('checkers', '🔴 דמקה')">🔴 דמקה</button>
                <button class="menu-btn" onclick="window.openModeModal('connect4', '🟡 ארבע בשורה')">🟡 ארבע בשורה</button>
                <button class="menu-btn" onclick="window.openModeModal('tictactoe', '❌ איקס עיגול')">❌ איקס עיגול</button>
                <button class="menu-btn" onclick="window.openModeModal('snakes', '🐍 סולמות ונחשים')">🐍 סולמות ונחשים</button>
                <button class="menu-btn" onclick="window.openModeModal('memory', '🦁 זיכרון')">🦁 זיכרון</button>
            </div>
        </div>

        <!-- לוחות המשחק -->
        <div id="chess-screen" class="game-screen" style="display:none;">
            <h2>שחמט</h2>
            <div id="chessBoard" style="width: 350px; max-width: 90vw; margin: 0 auto;"></div>
            <div class="info-panel"><p id="chess-status"></p><button class="action-btn back-btn" onclick="location.reload()">סיום</button></div>
        </div>

        <div id="checkers-screen" class="game-screen" style="display:none;">
            <h2>דמקה</h2>
            <div id="checkersBoard" style="width: 350px; height: 350px; margin: 0 auto; display: grid; grid-template-columns: repeat(8, 1fr); border: 4px solid #5e3a1f;"></div>
            <div class="info-panel"><p id="chk-status"></p><button class="action-btn back-btn" onclick="location.reload()">סיום</button></div>
        </div>

        <div id="connect4-screen" class="game-screen" style="display:none;">
            <h2>ארבע בשורה</h2>
            <div id="c4Board" style="width: 320px; height: 280px; margin: 0 auto; display: grid; grid-template-columns: repeat(7, 1fr); background: #2980b9; padding: 5px; border-radius: 10px;"></div>
            <div class="info-panel"><p id="c4-status"></p><button class="action-btn back-btn" onclick="location.reload()">סיום</button></div>
        </div>

        <div id="tictactoe-screen" class="game-screen" style="display:none;">
            <h2>איקס עיגול</h2>
            <div id="tttBoard" style="width: 280px; height: 280px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;"></div>
            <div class="info-panel"><p id="ttt-status"></p><button class="action-btn back-btn" onclick="location.reload()">סיום</button></div>
        </div>

        <div id="snakes-screen" class="game-screen" style="display:none;">
            <h2>סולמות ונחשים</h2>
            <div id="snakesBoard" style="width: 320px; height: 320px; margin: 0 auto; display: grid; grid-template-columns: repeat(10, 1fr); border: 2px solid #333;"></div>
            <div class="info-panel"><button class="action-btn" id="snk-dice-btn" onclick="window.rollSnakesDice()">🎲 הטל קובייה</button><p id="snk-status"></p><button class="action-btn back-btn" onclick="location.reload()">סיום</button></div>
        </div>

        <div id="memory-screen" class="game-screen" style="display:none;">
            <h2>משחק זיכרון</h2>
            <div id="memoryBoard" style="width: 320px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 0 auto;"></div>
            <div class="info-panel"><p id="mem-status"></p><button class="action-btn back-btn" onclick="location.reload()">סיום</button></div>
        </div>
    </div>

    <script type="module" src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chess.js"></script>
    <script src="js/checkers.js"></script>
    <script src="js/connect4.js"></script>
    <script src="js/tictactoe.js"></script>
    <script src="js/snakes.js"></script>
    <script src="js/memory.js"></script>
</body>
</html>
