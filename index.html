<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז משחקי עץ - Multiplayer Online</title>
    
    <!-- ספריות חיצוניות לשחמט ו-JQuery -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <!-- חיבור לקובץ העיצוב בתיקיית css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- מודל בחירת מצב משחק (מול המחשב או חבר מקומי) -->
    <div id="mode-modal-overlay">
        <div class="modal-box">
            <h3>איך תרצה לשחק?</h3>
            <button class="mode-btn ai" onclick="window.launchGame('ai')">🤖 נגד המחשב</button>
            <button class="mode-btn pvp" onclick="window.launchGame('pvp')">🧑‍🤝‍🧑 נגד חבר (מקומי)</button>
            <button class="mode-btn cancel" onclick="window.closeModeModal()">ביטול</button>
        </div>
    </div>

    <!-- מסך סיום משחק -->
    <div id="endgame-overlay">
        <div class="modal-box endgame-box">
            <h2 id="endgame-title">ניצחון!</h2>
            <div id="endgame-icon">🏆</div>
            <button class="mode-btn pvp" onclick="window.closeEndgameOverlay()">סגור</button>
        </div>
    </div>

    <div class="container">
        
        <!-- תפריט ראשי -->
        <div id="menu-screen">
            <h1>מרכז משחקי עץ</h1>
            
            <!-- ממשק לובי מולטיפלייר (Online) -->
            <div id="multiplayer-lobby" class="lobby-container">
                <div id="connection-status">מתחבר לענן...</div>
                <div id="setup-online-ui">
                    <p style="font-weight: bold; margin-bottom: 10px;">שחק נגד חבר מרחוק:</p>
                    <button class="action-btn create-btn" onclick="window.createOnlineRoom()">➕ צור חדר</button>
                    <span style="margin: 0 10px;">או</span>
                    <input type="text" id="room-input" placeholder="קוד">
                    <button class="action-btn join-btn" onclick="window.joinOnlineRoom()">🔗 הצטרף</button>
                </div>
                <div id="active-room-ui" style="display: none;">
                    <span>אתה בחדר: </span>
                    <strong id="display-room-id"></strong>
                    <p id="player-role-text" style="font-size: 0.8em; color: #666; margin-top: 5px;"></p>
                </div>
            </div>

            <div class="menu-grid">
                <button class="menu-btn btn-chess" onclick="window.openModeModal('chess')">♟️ שחמט</button>
                <button class="menu-btn btn-chk" onclick="window.openModeModal('checkers')">🔴 דמקה</button>
                <button class="menu-btn btn-ttt" onclick="window.openModeModal('tictactoe')">❌ איקס עיגול</button>
                <button class="menu-btn btn-snk" onclick="window.openModeModal('snakes')">🐍 סולמות ונחשים</button>
            </div>
        </div>

        <!-- מסך שחמט -->
        <div id="chess-screen" class="game-screen">
            <h2>שחמט אונליין</h2>
            <div id="chessBoard" class="game-board-container"></div>
            <div class="info-panel">
                <p id="chess-status" class="status-text"></p>
                <button class="action-btn back-btn" onclick="location.reload()">חזור לתפריט</button>
            </div>
        </div>

    </div>

    <!-- סדר טעינת הסקריפטים: Multiplayer (Module) חייב להיות ראשון -->
    <script type="module" src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chess.js"></script>
</body>
</html>
