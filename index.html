<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז משחקי קופסה עץ</title>
    
    <!-- ספריות חיצוניות (שחמט) -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <!-- חיבור קובץ העיצוב שלנו -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- מודל בחירת מצב משחק -->
    <div id="mode-modal-overlay">
        <div class="modal-box">
            <h3>איך תרצה לשחק?</h3>
            <button class="mode-btn ai" onclick="launchGame('ai')">🤖 נגד המחשב</button>
            <button class="mode-btn pvp" onclick="launchGame('pvp')">🧑‍🤝‍🧑 נגד חבר (על המסך)</button>
            <button class="mode-btn cancel" onclick="closeModeModal()">ביטול</button>
        </div>
    </div>

    <!-- מסך ניצחון והפסד -->
    <div id="endgame-overlay">
        <div class="modal-box endgame-box" id="endgame-box">
            <h2 id="endgame-title" class="endgame-title">ניצחון!</h2>
            <div id="endgame-icon" class="endgame-icon">🏆</div>
            <button class="mode-btn pvp" onclick="closeEndgameOverlay()">סגור</button>
        </div>
    </div>

    <div class="container">
        
        <!-- תפריט ראשי -->
        <div id="menu-screen">
            <h1 style="width: 100%;">מרכז משחקי עץ</h1>
            <button class="menu-btn btn-chess" onclick="openModeModal('chess')">♟️ שחמט</button>
            <button class="menu-btn btn-chk" onclick="openModeModal('checkers')">🔴 דמקה</button>
            <button class="menu-btn btn-c4" onclick="openModeModal('connect4')">🟡 ארבע בשורה</button>
            <button class="menu-btn btn-ttt" onclick="openModeModal('tictactoe')">❌ איקס עיגול</button>
            <button class="menu-btn btn-snk" onclick="openModeModal('snakes')">🐍 סולמות ונחשים</button>
            <button class="menu-btn btn-mem" onclick="openModeModal('memory')">🦁 משחק זיכרון</button>
        </div>

        <!-- 1. שחמט -->
        <div id="chess-screen" class="game-screen">
            <h2>שחמט</h2>
            <p id="chess-subtitle" class="rules-tip"></p>
            <div id="promotion-modal" class="promotion-modal">
                <h3>בחר הכתרה:</h3>
                <div class="promotion-pieces" id="promotion-pieces"></div>
                <button class="mode-btn cancel" onclick="cancelPromotion()">ביטול</button>
            </div>
            <div id="chessBoard" class="game-board-container"></div>
            <div class="info-panel"><p id="chess-status" class="status-text"></p><div class="controls"><button class="action-btn" onclick="initChess()">מחדש</button><button class="action-btn back-btn" onclick="showScreen('menu-screen')">לתפריט</button></div></div>
        </div>

        <!-- 2. דמקה -->
        <div id="checkers-screen" class="game-screen">
            <h2>דמקה</h2>
            <p class="rules-tip">בלי שרופים.</p>
            <div id="checkersBoard" class="game-board-container"></div>
            <div class="info-panel"><p id="chk-status" class="status-text"></p><div class="controls"><button class="action-btn" onclick="initCheckers()">מחדש</button><button class="action-btn back-btn" onclick="showScreen('menu-screen')">לתפריט</button></div></div>
        </div>

        <!-- 3. סולמות ונחשים -->
        <div id="snakes-screen" class="game-screen">
            <h2>סולמות ונחשים</h2>
            <div class="dice-area">
                <div class="dice-scene" id="snk-scene"><div class="dice" id="snk-dice"><div class="dice-face front"><span class="pip"></span></div><div class="dice-face right"><span class="pip"></span><span class="pip"></span></div><div class="dice-face left"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div><div class="dice-face top"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div><div class="dice-face bottom"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div><div class="dice-face back"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div></div></div>
            </div>
            <button id="dice-btn" onclick="rollSnakesDice()">🎲 הטל קובייה</button>
            <div id="snakesBoardWrapper"><div id="snakesBoard"></div></div>
            <div class="info-panel"><p id="snk-status" class="status-text"></p><div class="controls"><button class="action-btn" onclick="initSnakes()">מחדש</button><button class="action-btn back-btn" onclick="showScreen('menu-screen')">לתפריט</button></div></div>
        </div>

        <!-- 4. משחק זיכרון -->
        <div id="memory-screen" class="game-screen">
            <h2>משחק זיכרון</h2>
            <div class="score-board"><div style="color: #27ae60;"><span id="mem-p1-label"></span> <span id="mem-score-player">0</span></div><div style="color: #c0392b;"><span id="mem-p2-label"></span> <span id="mem-score-ai">0</span></div></div>
            <div id="memoryBoard"></div>
            <div class="info-panel"><p id="mem-status" class="status-text"></p><div class="controls"><button class="action-btn" onclick="initMemory()">מחדש</button><button class="action-btn back-btn" onclick="showScreen('menu-screen')">לתפריט</button></div></div>
        </div>

        <!-- 5. איקס עיגול -->
        <div id="tictactoe-screen" class="game-screen">
            <h2>איקס עיגול</h2>
            <div id="tttBoard"></div>
            <div class="info-panel"><p id="ttt-status" class="status-text"></p><div class="controls"><button class="action-btn" onclick="initTicTacToe()">מחדש</button><button class="action-btn back-btn" onclick="showScreen('menu-screen')">לתפריט</button></div></div>
        </div>

        <!-- 6. ארבע בשורה -->
        <div id="connect4-screen" class="game-screen">
            <h2>ארבע בשורה</h2>
            <div id="c4Board"></div>
            <div class="info-panel"><p id="c4-status" class="status-text"></p><div class="controls"><button class="action-btn" onclick="initConnect4()">מחדש</button><button class="action-btn back-btn" onclick="showScreen('menu-screen')">לתפריט</button></div></div>
        </div>

    </div>

    <!-- חיבור קבצי הלוגיקה והמשחקים (תמיד בסוף ה-body) -->
    <script src="js/main.js"></script>
    <script src="js/chess.js"></script>
    <script src="js/checkers.js"></script>
    <script src="js/snakes.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/tictactoe.js"></script>
    <script src="js/connect4.js"></script>
</body>
</html>
