<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז משחקי עץ - Wood Master Online</title>
    
    <!-- ספריות חיצוניות -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- מודל בחירת מצב -->
    <div id="mode-modal-overlay">
        <div class="modal-box">
            <h2 id="mode-modal-title" style="color:var(--dark-wood)">משחק</h2>
            <p style="font-weight:bold">איך תרצו לשחק?</p>
            <button class="mode-btn pvp" onclick="window.launchGame('pvp')" style="background:#1565c0; color:white; width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;">�‍🤝‍🧑 נגד חבר (מקומי)</button>
            <button id="online-mode-btn" class="mode-btn" onclick="window.showOnlineLobby()" style="background:#2e7d32; color:white; width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;">🌐 נגד חבר מרחוק</button>
            
            <div style="margin:20px 0; padding:15px 0; border-top:1px solid rgba(255,255,255,0.2); border-bottom:1px solid rgba(255,255,255,0.2);">
                <p style="font-weight:bold; margin-bottom:15px">🤖 נגד המחשב - בחר רמת קושי:</p>
                <button class="mode-btn ai" onclick="window.setAIDifficulty('easy'); window.launchGame('ai')" style="background:#4caf50; color:white; width:100%; padding:12px; margin-bottom:8px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">🌟 קל</button>
                <button class="mode-btn ai" onclick="window.setAIDifficulty('medium'); window.launchGame('ai')" style="background:#ff9800; color:white; width:100%; padding:12px; margin-bottom:8px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">⚡ בינוני</button>
                <button class="mode-btn ai" onclick="window.setAIDifficulty('hard'); window.launchGame('ai')" style="background:#f44336; color:white; width:100%; padding:12px; margin-bottom:8px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">🔥 קשה</button>
            </div>
            
            <button onclick="window.closeModeModal()" style="background:#eee; color:#333; width:100%; padding:10px; border-radius:10px; border:none; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <!-- מסך לובי אונליין -->
    <div id="online-lobby-screen" class="game-screen">
        <h1>משחק רשת</h1>
        <div class="lobby-card" style="background:white; padding:30px">
            <h3>אפשרות 1: יצירת חדר</h3>
            <button class="action-btn" onclick="window.createOnlineRoom()" style="font-size:1.2rem; background:var(--success)">➕ צור חדר וקבל קוד</button>
            <div id="active-room-info" style="display:none; margin-top:20px; padding:15px; background:#f1f8e9; border-radius:10px">
                <p>הקוד שלך לשלוח לחבר:</p>
                <strong id="display-room-id" style="font-size:2.5rem; color:var(--accent); letter-spacing:5px"></strong>
                <p class="pulse">⏳ ממתין שהחבר יצטרף...</p>
            </div>
            <div style="margin:25px 0; font-weight:bold; color:#999">--- או ---</div>
            <h3>אפשרות 2: הצטרפות לחדר</h3>
            <div class="online-actions">
                <input type="text" id="room-input" placeholder="קוד">
                <button class="action-btn" onclick="window.joinOnlineRoom()" style="background:#1565c0">🔗 הצטרף</button>
            </div>
        </div>
        <button class="action-btn back-btn" onclick="window.showMenuScreen()">חזור לתפריט</button>
    </div>

    <!-- הודעת סיום -->
    <div id="endgame-overlay">
        <div class="modal-box">
            <h2 id="endgame-title">סיום!</h2>
            <div id="endgame-icon" style="font-size:4rem">🏆</div>
            <button class="action-btn" onclick="window.showMenuScreen()" style="margin-top:20px; width:100%">חזור לתפריט הראשי</button>
        </div>
    </div>

    <div class="container">
        <!-- תפריט ראשי -->
        <div id="menu-screen">
            <h1>מרכז משחקי עץ</h1>
            <div id="connection-status" style="margin-bottom:20px; font-weight:bold; color:var(--dark-wood)">מתחבר לענן... ☁️</div>
            
            <div class="menu-grid">
                <button class="menu-btn" onclick="window.openModeModal('chess', 'שחמט')">
                    <span class="icon">♟️</span> שחמט
                </button>
                <button class="menu-btn" onclick="window.openModeModal('checkers', 'דמקה')">
                    <span class="icon">🔴</span> דמקה
                </button>
                <button class="menu-btn" onclick="window.openModeModal('connect4', '4 בשורה')">
                    <span class="icon">🟡</span> 4 בשורה
                </button>
                <button class="menu-btn" onclick="window.openModeModal('tictactoe', 'איקס עיגול')">
                    <span class="icon">❌</span> איקס עיגול
                </button>
                <button class="menu-btn" onclick="window.openModeModal('snakes', 'סולמות ונחשים')">
                    <span class="icon">🐍</span> סולמות ונחשים
                </button>
                <button class="menu-btn" onclick="window.openModeModal('memory', 'משחק זיכרון')">
                    <span class="icon">🦁</span> זיכרון
                </button>
            </div>
        </div>

        <!-- מסכי משחק -->
        <div id="chess-screen" class="game-screen">
            <h2>שחמט</h2>
            <div id="chessBoard" class="game-board-container"></div>
            <div class="info-panel"><div id="chess-status" class="status-bar"></div><button class="action-btn back-btn" onclick="window.showMenuScreen()">סיום</button></div>
        </div>

        <div id="checkers-screen" class="game-screen">
            <h2>דמקה</h2>
            <div id="checkersBoard" class="game-board-container"></div>
            <div class="info-panel"><div id="chk-status" class="status-bar"></div><button class="action-btn back-btn" onclick="window.showMenuScreen()">סיום</button></div>
        </div>

        <div id="connect4-screen" class="game-screen">
            <h2>4 בשורה</h2>
            <div id="c4Board" class="game-board-container" style="height:450px"></div>
            <div class="info-panel"><div id="c4-status" class="status-bar"></div><button class="action-btn back-btn" onclick="window.showMenuScreen()">סיום</button></div>
        </div>

        <div id="memory-screen" class="game-screen">
            <h2>משחק זיכרון</h2>
            <div id="mem-score-box" style="font-size:1.2rem; font-weight:bold; margin-bottom:10px"></div>
            <div id="memoryBoard" class="game-board-container" style="display:grid; grid-template-columns:repeat(8, 1fr); gap:10px; padding:10px"></div>
            <div class="info-panel"><div id="mem-status" class="status-bar"></div><button class="action-btn back-btn" onclick="window.showMenuScreen()">סיום</button></div>
        </div>

        <div id="snakes-screen" class="game-screen">
            <h2>סולמות ונחשים</h2>
            <button id="snk-dice-btn" class="action-btn" onclick="window.rollSnakesDice()" style="margin-bottom:15px; font-size:1.5rem">🎲 הטל קובייה</button>
            <div id="snakesBoard" class="game-board-container"></div>
            <div class="info-panel"><div id="snk-status" class="status-bar"></div><button class="action-btn back-btn" onclick="window.showMenuScreen()">סיום</button></div>
        </div>

        <div id="tictactoe-screen" class="game-screen">
            <h2>איקס עיגול</h2>
            <div id="tttBoard" class="game-board-container" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; background:var(--dark-wood); padding:10px"></div>
            <div class="info-panel"><div id="ttt-status" class="status-bar"></div><button class="action-btn back-btn" onclick="window.showMenuScreen()">סיום</button></div>
        </div>
    </div>

    <script type="module" src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chess.js"></script>
    <script src="js/checkers.js"></script>
    <script src="js/connect4.js"></script>
    <script src="js/tictactoe.js"></script>
    <script src="js/snakes.js"></script>
    <script src="js/memory.js"></script>
    <script>
        // Show menu screen when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (window.showMenuScreen) {
                window.showMenuScreen();
            }
        });
    </script>
</body>
</html>
