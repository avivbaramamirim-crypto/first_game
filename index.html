<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז משחקי עץ - Wood Master</title>
    
    <!-- ספריות חיצוניות -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="mode-modal-overlay">
        <div class="modal-box">
            <h3 id="mode-modal-title">בחר משחק</h3>
            <p>איך תרצה לשחק?</p>
            <button class="mode-btn ai" onclick="window.launchGame('ai')">🤖 נגד המחשב</button>
            <button class="mode-btn pvp" onclick="window.launchGame('pvp')">🧑‍🤝‍🧑 נגד חבר (מקומי)</button>
            <button id="online-mode-btn" class="mode-btn" style="background:#27ae60" onclick="window.showOnlineLobby()">🌐 נגד חבר מרחוק</button>
            <button class="mode-btn cancel" onclick="window.closeModeModal()">ביטול</button>
        </div>
    </div>

    <div id="online-lobby-screen" class="game-screen">
        <h2>משחק רשת</h2>
        <div class="modal-box" style="width:100%; box-sizing:border-box">
            <button class="menu-btn" onclick="window.createOnlineRoom()">➕ צור חדר וקבל קוד</button>
            <div id="active-room-info" style="display:none; margin:20px 0">
                <p>הקוד שלך: <strong id="display-room-id" style="font-size:1.5rem; color:var(--danger)"></strong></p>
                <p>ממתין ליריב...</p>
            </div>
            <hr>
            <input type="text" id="room-input" placeholder="הכנס קוד שקיבלת" style="padding:10px; width:150px; text-align:center">
            <button class="action-btn" onclick="window.joinOnlineRoom()">הצטרף</button>
        </div>
        <button class="back-btn" onclick="window.location.reload()">חזור</button>
    </div>

    <div id="endgame-overlay">
        <div class="modal-box">
            <h2 id="endgame-title">סיום!</h2>
            <div id="endgame-icon" style="font-size:3rem">🏆</div>
            <button class="mode-btn pvp" onclick="window.closeEndgameOverlay()">סגור</button>
        </div>
    </div>

    <div class="container">
        <div id="menu-screen">
            <h1>מרכז משחקי עץ</h1>
            <div id="connection-status" style="margin-bottom:15px; font-weight:bold">מתחבר לענן...</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="window.openModeModal('chess', '♟️ שחמט')">♟️ שחמט</button>
                <button class="menu-btn" onclick="window.openModeModal('checkers', '🔴 דמקה')">🔴 דמקה</button>
                <button class="menu-btn" onclick="window.openModeModal('connect4', '🟡 4 בשורה')">🟡 4 בשורה</button>
                <button class="menu-btn" onclick="window.openModeModal('tictactoe', '❌ איקס עיגול')">❌ איקס עיגול</button>
                <button class="menu-btn" onclick="window.openModeModal('snakes', '🐍 סולמות ונחשים')">🐍 סולמות ונחשים</button>
                <button class="menu-btn" onclick="window.openModeModal('memory', '🦁 זיכרון')">🦁 זיכרון</button>
            </div>
        </div>

        <!-- לוחות -->
        <div id="chess-screen" class="game-screen">
            <h2>שחמט</h2>
            <div id="chessBoard" class="game-board-container"></div>
            <div class="info-panel"><div id="chess-status" class="status-bar"></div><button class="back-btn" onclick="location.reload()">חזור</button></div>
        </div>

        <div id="checkers-screen" class="game-screen">
            <h2>דמקה</h2>
            <div id="checkersBoard" class="game-board-container"></div>
            <div class="info-panel"><div id="chk-status" class="status-bar"></div><button class="back-btn" onclick="location.reload()">חזור</button></div>
        </div>

        <div id="connect4-screen" class="game-screen">
            <h2>ארבע בשורה</h2>
            <div id="c4Board" class="game-board-container" style="height:400px"></div>
            <div class="info-panel"><div id="c4-status" class="status-bar"></div><button class="back-btn" onclick="location.reload()">חזור</button></div>
        </div>

        <div id="memory-screen" class="game-screen">
            <h2>זיכרון</h2>
            <div id="mem-score-box" class="score-display"></div>
            <div id="memoryBoard" class="game-board-container"></div>
            <div class="info-panel"><div id="mem-status" class="status-bar"></div><button class="back-btn" onclick="location.reload()">חזור</button></div>
        </div>

        <div id="snakes-screen" class="game-screen">
            <h2>סולמות ונחשים</h2>
            <button id="snk-dice-btn" class="menu-btn" onclick="window.rollSnakesDice()">🎲 הטל קובייה</button>
            <div id="snakesBoard" class="game-board-container"></div>
            <div class="info-panel"><div id="snk-status" class="status-bar"></div><button class="back-btn" onclick="location.reload()">חזור</button></div>
        </div>
    </div>

    <script type="module" src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chess.js"></script>
    <script src="js/checkers.js"></script>
    <script src="js/connect4.js"></script>
    <script src="js/tictactoe.js"></script>
    <script src="js/snakes.js"></script>
    <script src="js/memory.js"></script>
</body>
</html>
